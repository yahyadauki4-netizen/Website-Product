<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahya Dauki | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --accent-color: #00ff9d; 
            --text-main: #e0e0e0;
            --border-style: 4px solid #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'VT323', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
        }

        nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        nav button {
            background: var(--container-bg);
            border: var(--border-style);
            color: var(--text-main);
            padding: 10px 20px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            cursor: pointer;
        }

        nav button:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .main-frame {
            background-color: var(--container-bg);
            border: var(--border-style);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            box-shadow: 10px 10px 0px #000;
            box-sizing: border-box;
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        h1 {
            color: var(--accent-color);
            font-size: 48px;
            margin-top: 0;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        /* PROFILE IMAGE STYLING */
        .profile-container {
            margin: 20px 0;
            display: inline-block;
        }

        .profile-image {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 4px solid var(--accent-color);
            box-shadow: 5px 5px 0px #000;
            display: block;
        }

        /* DUAL VIDEO GRID SYSTEM */
        .video-container-grid {
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap;     
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
        }

        .terminal-box {
            flex: 1;             
            min-width: 300px;    
            max-width: 400px;
            border: 4px solid #333;
            padding: 5px;
            background: #000;
        }

        .terminal-header {
            background: #333;
            color: var(--accent-color);
            padding: 5px 10px;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* ESSAY STYLING */
        .essay-text {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            font-size: 18px;
            line-height: 1.6;
            background: #121212;
            padding: 25px;
            border-left: 4px solid var(--accent-color);
        }

        .essay-text p {
            margin-top: 0;
            margin-bottom: 15px;
        }

        footer { margin-top: 40px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

    </nav>
